<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Concept 3: Quote bubbles + house — HVAC marketplace feel -->
  <rect width="400" height="400" fill="#141810" rx="40"/>
  <!-- Three quote dots representing 3 bids -->
  <circle cx="120" cy="150" r="35" fill="#1a5c3a"/>
  <circle cx="200" cy="130" r="35" fill="#2a7a4f"/>
  <circle cx="280" cy="150" r="35" fill="#1a5c3a"/>
  <!-- Check mark in middle bubble -->
  <polyline points="183,130 197,144 220,118" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Connecting tails -->
  <polygon points="120,185 105,210 145,190" fill="#1a5c3a"/>
  <!-- House outline below -->
  <polyline points="100,280 200,210 300,280" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="130" y="280" width="140" height="80" fill="none" stroke="white" stroke-width="10" rx="4"/>
  <!-- Door -->
  <rect x="180" y="310" width="40" height="50" rx="20" fill="white"/>
</svg>