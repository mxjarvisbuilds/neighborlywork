<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Compare Quotes | NeighborlyWork</title>
  <meta name="description" content="Compare your HVAC quotes side by side and choose the contractor that fits best." />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap');
    :root{--green:#1a5c3a;--orange:#c8401a;--off:#f5f5f7;--white:#fff;--text:#1d1d1f;--muted:#6e6e73;--line:rgba(0,0,0,.08);--shadow:0 18px 50px rgba(0,0,0,.08)}
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;font-family:'DM Sans',system-ui,sans-serif;background:var(--off);color:var(--text)}
    .wrap{width:min(1160px,calc(100% - 28px));margin:0 auto;padding-bottom:32px}.nav{padding:22px 0 10px;display:flex;align-items:center;justify-content:space-between;gap:16px}.logo{display:inline-flex;align-items:center;gap:10px;text-decoration:none;color:var(--green);font-family:'Outfit',sans-serif;font-weight:700;font-size:1.2rem}.mark{width:13px;height:13px;border-radius:4px;background:var(--green);box-shadow:0 0 0 4px rgba(26,92,58,.10)}
    .nav-actions{display:flex;gap:10px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:16px;padding:13px 16px;font-weight:800;cursor:pointer;font-size:.96rem;text-decoration:none;transition:transform .15s ease,opacity .15s ease,box-shadow .15s ease}.btn:hover{transform:translateY(-1px)}.btn-green{background:var(--green);color:#fff;box-shadow:0 12px 24px rgba(26,92,58,.16)}.btn-light{background:#fff;color:var(--text);border:1px solid var(--line)}.btn[disabled]{opacity:.5;pointer-events:none;transform:none}
    .hero{padding:18px 0 22px}.eyebrow{color:var(--green);font-size:.78rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}.hero h1{font-family:'Outfit',sans-serif;letter-spacing:-.04em;line-height:.95;margin:0;font-size:clamp(2.1rem,5vw,4.3rem)}.sub{margin:12px 0 0;color:var(--muted);line-height:1.65;max-width:64ch}
    .message{display:none;border-radius:18px;padding:14px 16px;margin:0 0 16px;font-size:.95rem;line-height:1.5}.message.show{display:block}.message.error{background:#fff1ed;color:#8a2e18}.message.success{background:#edf7ef;color:var(--green)}
    .card{background:#fff;border:none;border-radius:26px;box-shadow:var(--shadow)}
    .summary-card{padding:22px;margin-bottom:18px}.summary-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:18px}.summary-head h2{margin:0;font-family:'Outfit',sans-serif;font-size:1.55rem;letter-spacing:-.03em}.summary-head p{margin:8px 0 0;color:var(--muted)}
    .status-pill,.best-badge,.option-badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:8px 12px;font-size:.8rem;font-weight:800}.status-pill{background:#eef5ef;color:var(--green)}.best-badge{background:#fff3e9;color:var(--orange)}.option-badge{background:#f1f2f6;color:var(--text)}
    .summary-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.summary-item{padding:16px;border-radius:18px;background:#fafbf9;border:1px solid var(--line)}.summary-label{font-size:.8rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}.summary-value{margin-top:8px;font-size:1rem;font-weight:700;color:var(--text)}
    .quotes-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.quote-card{padding:20px;display:flex;flex-direction:column;min-height:100%}.quote-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:16px}.quote-title{font-family:'Outfit',sans-serif;font-size:1.35rem;letter-spacing:-.03em;margin:0 0 6px}.quote-sub{color:var(--muted);font-size:.95rem;line-height:1.5}.rating{display:inline-flex;align-items:center;gap:6px;color:var(--text);font-weight:700;margin-top:8px}.rating .star{color:#ffb020}.price{font-family:'Outfit',sans-serif;font-size:2.4rem;letter-spacing:-.06em;color:var(--green);line-height:1;margin:18px 0 14px}.quote-meta{display:grid;gap:10px;margin-bottom:18px}.meta-row{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}.meta-row:last-child{border-bottom:none}.meta-label{color:var(--muted)}.meta-value{text-align:right;font-weight:700}.note{margin:0 0 18px;padding:14px;border-radius:16px;background:#fafbf9;border:1px solid var(--line);color:var(--text);line-height:1.6}.note strong{display:block;margin-bottom:6px;font-size:.9rem}.empty{padding:34px 26px;text-align:center}.empty h3{margin:0 0 10px;font-family:'Outfit',sans-serif;font-size:1.5rem;letter-spacing:-.03em}.empty p{margin:0;color:var(--muted);line-height:1.65}.loading-shell{display:grid;gap:16px}.skeleton{height:120px;border-radius:24px;background:linear-gradient(90deg,#f0f1f4 25%,#e8eaee 37%,#f0f1f4 63%);background-size:400% 100%;animation:shimmer 1.4s ease infinite}@keyframes shimmer{0%{background-position:100% 0}100%{background-position:0 0}}
    @media(max-width:980px){.summary-grid,.quotes-grid{grid-template-columns:1fr 1fr}}
    @media(max-width:680px){.wrap{width:min(100% - 20px,1160px)}.nav{flex-direction:column;align-items:flex-start}.summary-grid,.quotes-grid{grid-template-columns:1fr}.hero h1{font-size:clamp(2rem,11vw,3rem)}.quote-top,.summary-head{flex-direction:column;align-items:flex-start}.btn{width:100%}.nav-actions{width:100%}.nav-actions .btn{flex:1}.meta-row{align-items:flex-start;flex-direction:column}.meta-value{text-align:left}.price{font-size:2.1rem}}
  </style>
</head>
<body>
  <main class="wrap">
    <header class="nav">
      <a class="logo" href="/index.html"><span class="mark"></span>NeighborlyWork</a>
      <div class="nav-actions">
        <a class="btn btn-light" href="/app/homeowner-dashboard.html">Back to Dashboard</a>
        <button class="btn btn-green" id="logoutBtn" type="button">Log Out</button>
      </div>
    </header>

    <section class="hero">
      <div class="eyebrow">Quote Comparison</div>
      <h1>Compare your contractor options.</h1>
      <p class="sub">Review pricing, equipment, warranties, and timing side by side. When one feels right, choose it and we’ll update your request instantly.</p>
    </section>

    <div class="message error" id="errorBox"></div>
    <div class="message success" id="successBox"></div>

    <section id="content">
      <div class="loading-shell" id="loadingState">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </section>
  </main>

  <script>
    const OPTION_LABELS = ['Option A', 'Option B', 'Option C'];

    function showMessage(id, text) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = text;
      el.classList.add('show');
    }

    function clearMessages() {
      ['errorBox', 'successBox'].forEach(id => {
        const el = document.getElementById(id);
        el.textContent = '';
        el.classList.remove('show');
      });
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatMoney(value) {
      const amount = Number(value);
      if (!Number.isFinite(amount)) return 'Price unavailable';
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(amount);
    }

    function formatDate(value) {
      if (!value) return '—';
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) return value;
      return parsed.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function formatTimeline(value) {
      if (!value) return '—';
      return String(value)
        .replace(/_/g, ' ')
        .replace(/\b\w/g, char => char.toUpperCase());
    }

    function yesNo(value) {
      if (value === true) return 'Yes';
      if (value === false) return 'No';
      return '—';
    }

    function pickValue(obj, keys, fallback = '—') {
      for (const key of keys) {
        const value = obj?.[key];
        if (value !== undefined && value !== null && value !== '') return value;
      }
      return fallback;
    }

    function getLeadId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('lead_id') || params.get('lead') || '';
    }

    async function loadLead(user, leadId) {
      const { data, error } = await db
        .from('leads')
        .select('*')
        .eq('id', leadId)
        .eq('homeowner_id', user.id)
        .single();
      if (error) throw error;
      if (!data) throw new Error('We could not find that quote request.');
      return data;
    }

    async function loadQuotes(leadId) {
      const { data, error } = await db
        .from('quotes')
        .select('*')
        .eq('lead_id', leadId)
        .order('total_price', { ascending: true });
      if (error) throw error;
      return data || [];
    }

    async function loadContractorDetails(quotes) {
      const contractorIds = [...new Set(quotes.map(q => q.contractor_id).filter(Boolean))];
      if (!contractorIds.length) return { contractors: new Map(), users: new Map() };

      const [{ data: contractors, error: contractorsError }, { data: users, error: usersError }] = await Promise.all([
        db.from('contractors').select('*').in('id', contractorIds),
        db.from('users').select('*').in('id', contractorIds)
      ]);

      if (contractorsError) throw contractorsError;
      if (usersError) throw usersError;

      return {
        contractors: new Map((contractors || []).map(row => [row.id, row])),
        users: new Map((users || []).map(row => [row.id, row]))
      };
    }

    function renderSummary(lead, quoteCount) {
      const statusText = lead.status ? formatTimeline(lead.status) : 'Open';
      return `
        <section class="card summary-card">
          <div class="summary-head">
            <div>
              <h2>Your request summary</h2>
              <p>We found ${quoteCount} contractor option${quoteCount === 1 ? '' : 's'} for this homeowner request.</p>
            </div>
            <span class="status-pill">${escapeHtml(statusText)}</span>
          </div>
          <div class="summary-grid">
            <div class="summary-item"><div class="summary-label">Service type</div><div class="summary-value">${escapeHtml(pickValue(lead, ['service_type']))}</div></div>
            <div class="summary-item"><div class="summary-label">ZIP</div><div class="summary-value">${escapeHtml(pickValue(lead, ['zip_code']))}</div></div>
            <div class="summary-item"><div class="summary-label">Home size</div><div class="summary-value">${escapeHtml(pickValue(lead, ['home_size_sqft'], '—'))}</div></div>
            <div class="summary-item"><div class="summary-label">Timeline</div><div class="summary-value">${escapeHtml(formatTimeline(pickValue(lead, ['timeline'], '—')))}</div></div>
          </div>
        </section>`;
    }

    function buildQuoteCard(quote, index, contractor, contractorUser) {
      const contractorName = pickValue(contractor, ['business_name'], pickValue(contractorUser, ['full_name'], 'Local contractor'));
      const ratingRaw = pickValue(contractor, ['rating', 'avg_rating', 'average_rating'], pickValue(contractorUser, ['rating', 'avg_rating', 'average_rating'], null));
      const rating = ratingRaw === null ? 'New' : Number(ratingRaw).toFixed(1);
      const equipmentBrand = pickValue(quote, ['equipment_brand']);
      const equipmentModel = pickValue(quote, ['equipment_model']);
      const seer = pickValue(quote, ['seer_rating'], '—');
      const note = pickValue(quote, ['note_to_homeowner'], '');
      const isBestValue = index === 0;

      return `
        <article class="card quote-card">
          <div class="quote-top">
            <div>
              <span class="option-badge">${OPTION_LABELS[index] || `Option ${index + 1}`}</span>
              <h3 class="quote-title">${escapeHtml(contractorName)}</h3>
              <div class="quote-sub">${escapeHtml([equipmentBrand, equipmentModel, seer !== '—' ? `${seer} SEER` : ''].filter(Boolean).join(' · ') || 'Equipment details coming soon')}</div>
              <div class="rating"><span class="star">★</span><span>${escapeHtml(rating)}</span></div>
            </div>
            ${isBestValue ? '<span class="best-badge">Best Value</span>' : ''}
          </div>

          <div class="price">${escapeHtml(formatMoney(quote.total_price))}</div>

          <div class="quote-meta">
            <div class="meta-row"><span class="meta-label">Warranty</span><span class="meta-value">${escapeHtml(pickValue(quote, ['warranty_years']))}</span></div>
            <div class="meta-row"><span class="meta-label">Removal included</span><span class="meta-value">${escapeHtml(yesNo(pickValue(quote, ['includes_removal'], null)))}</span></div>
            <div class="meta-row"><span class="meta-label">Permits included</span><span class="meta-value">${escapeHtml(yesNo(pickValue(quote, ['permits_included'], null)))}</span></div>
            <div class="meta-row"><span class="meta-label">Financing</span><span class="meta-value">${escapeHtml(yesNo(pickValue(quote, ['financing_available'], null)))}</span></div>
            <div class="meta-row"><span class="meta-label">Available date</span><span class="meta-value">${escapeHtml(formatDate(pickValue(quote, ['available_date'], '')))}</span></div>
            <div class="meta-row"><span class="meta-label">Install time</span><span class="meta-value">${escapeHtml(pickValue(quote, ['install_time']))}</span></div>
          </div>

          ${note ? `<div class="note"><strong>Note from contractor</strong>${escapeHtml(note)}</div>` : ''}

          <button class="btn btn-green choose-btn" type="button" data-quote-id="${escapeHtml(quote.id)}" data-contractor-id="${escapeHtml(quote.contractor_id || '')}">Choose This Contractor</button>
        </article>`;
    }

    function renderEmpty(lead) {
      return `
        ${renderSummary(lead, 0)}
        <section class="card empty">
          <h3>Your quotes are on their way.</h3>
          <p>Contractors have 48 hours to respond.</p>
        </section>`;
    }

    async function chooseQuote(leadId, selectedQuoteId, selectedContractorId, quotes) {
      if (!selectedContractorId) throw new Error('This quote is missing a contractor id.');

      const otherQuoteIds = quotes.filter(q => q.id !== selectedQuoteId).map(q => q.id);
      const updates = [
        db.from('leads').update({ selected_contractor_id: selectedContractorId, status: 'selected' }).eq('id', leadId),
        db.from('quotes').update({ status: 'selected' }).eq('id', selectedQuoteId)
      ];
      if (otherQuoteIds.length) {
        updates.push(db.from('quotes').update({ status: 'rejected' }).in('id', otherQuoteIds));
      }

      const results = await Promise.all(updates);
      const failed = results.find(result => result.error);
      if (failed?.error) throw failed.error;

      window.location.href = '/app/homeowner-dashboard.html';
    }

    async function loadPage() {
      clearMessages();
      const user = await requireAuth('homeowner');
      if (!user) return;

      const leadId = getLeadId();
      if (!leadId) throw new Error('Missing lead_id in the URL.');

      const lead = await loadLead(user, leadId);
      const quotes = (await loadQuotes(leadId)).slice(0, 3);
      const { contractors, users } = await loadContractorDetails(quotes);
      const content = document.getElementById('content');

      if (!quotes.length) {
        content.innerHTML = renderEmpty(lead);
        return;
      }

      content.innerHTML = `
        ${renderSummary(lead, quotes.length)}
        <section class="quotes-grid">
          ${quotes.map((quote, index) => buildQuoteCard(quote, index, contractors.get(quote.contractor_id), users.get(quote.contractor_id))).join('')}
        </section>`;

      content.querySelectorAll('.choose-btn').forEach(button => {
        button.addEventListener('click', async () => {
          const quoteId = button.dataset.quoteId;
          const contractorId = button.dataset.contractorId;
          const originalText = button.textContent;
          document.querySelectorAll('.choose-btn').forEach(btn => btn.disabled = true);
          button.textContent = 'Selecting...';
          clearMessages();
          try {
            await chooseQuote(leadId, quoteId, contractorId, quotes);
          } catch (err) {
            document.querySelectorAll('.choose-btn').forEach(btn => btn.disabled = false);
            button.textContent = originalText;
            showMessage('errorBox', err.message || 'Could not select this contractor. Please try again.');
          }
        });
      });
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await db.auth.signOut();
      window.location.href = '/app/homeowner-auth.html';
    });

    (async function init() {
      try {
        await loadPage();
      } catch (err) {
        document.getElementById('content').innerHTML = '';
        showMessage('errorBox', err.message || 'Could not load your quotes.');
      }
    })();
  </script>
</body>
</html>
