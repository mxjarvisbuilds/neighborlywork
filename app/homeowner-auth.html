<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Homeowner Account | NeighborlyWork</title>
  <meta name="description" content="Create an account to save HVAC quotes, track requests, and compare contractors in one place." />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap');
    :root{--green:#1a5c3a;--orange:#c8401a;--off:#f5f5f7;--white:#fff;--text:#1d1d1f;--muted:#6e6e73;--line:rgba(0,0,0,.08);--shadow:0 18px 50px rgba(0,0,0,.08)}
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;font-family:'DM Sans',system-ui,sans-serif;background:var(--off);color:var(--text)}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 18px}.card{width:min(100%,560px);background:#fff;border:none;border-radius:28px;box-shadow:var(--shadow);padding:30px}
    .brand{display:flex;align-items:center;justify-content:center;gap:10px;font-family:'Outfit',sans-serif;font-weight:700;font-size:1.5rem;color:var(--green);margin-bottom:18px}.mark{width:14px;height:14px;border-radius:4px;background:var(--green);box-shadow:0 0 0 4px rgba(26,92,58,.10)}
    h1{font-family:'Outfit',sans-serif;letter-spacing:-.04em;line-height:.96;margin:0;font-size:clamp(2rem,4.6vw,3.2rem);text-align:center}
    .sub{color:var(--muted);text-align:center;max-width:44ch;margin:14px auto 24px;line-height:1.6}
    .tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;background:#f3f5f1;padding:6px;border-radius:16px;margin-bottom:22px}.tab{border:none;background:transparent;padding:12px 10px;border-radius:12px;font-weight:800;color:var(--muted);cursor:pointer;font:inherit}.tab.active{background:#fff;color:var(--green);box-shadow:0 8px 22px rgba(0,0,0,.06)}
    .screen{display:none}.screen.active{display:block}.form{display:grid;gap:12px}.field{display:grid;gap:6px}label{font-size:.93rem;font-weight:700;color:#283229}
    input{width:100%;padding:14px 14px;border:none;border-radius:14px;background:#f5f5f7;font:inherit;color:var(--text)}input:focus{outline:2px solid rgba(26,92,58,.22)}
    .password-wrap{position:relative}.toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);border:none;background:#eef5ef;color:var(--green);font-weight:800;border-radius:10px;padding:8px 10px;cursor:pointer}
    .btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:16px;padding:15px 18px;font-weight:800;cursor:pointer;font-size:1rem}.btn-green{background:var(--green);color:#fff;width:100%}
    .divider{display:flex;align-items:center;gap:12px;color:var(--muted);margin:18px 0}.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line)}
    .link-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:14px}.link{background:none;border:none;color:var(--green);font-weight:800;cursor:pointer;font:inherit}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.notice,.error,.success{border-radius:14px;padding:12px 14px;font-size:.95rem;line-height:1.5;display:none}.notice.show,.error.show,.success.show{display:block}.notice{background:#eef5ef;color:var(--green)}.error{background:#fff1ed;color:#8a2e18}.success{background:#eef7f0;color:var(--green)}
    .loading{opacity:.7;pointer-events:none}
    @media(max-width:640px){.card{padding:22px}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand"><span class="mark"></span>NeighborlyWork</div>

      <div class="tabs" role="tablist" aria-label="Homeowner account tabs">
        <button class="tab active" data-screen="login" type="button">Sign In</button>
        <button class="tab" data-screen="signup" type="button">Create Account</button>
      </div>

      <section class="screen active" id="login">
        <h1>Welcome back</h1>
        <p class="sub">Sign in to access your saved quotes, requests, and updates.</p>
        <div class="error" id="loginError"></div>
        <div class="success" id="loginSuccess"></div>
        <form class="form" id="loginForm">
          <div class="field"><label>Email address</label><input id="loginEmail" type="email" placeholder="you@example.com" required></div>
          <div class="field">
            <label>Password</label>
            <div class="password-wrap">
              <input id="loginPass" type="password" placeholder="Your password" required>
              <button class="toggle" type="button" data-toggle="loginPass">Show</button>
            </div>
          </div>
          <button class="btn btn-green" type="submit">Sign In →</button>
        </form>
        <div class="divider">Need an account?</div>
        <div class="link-row"><button class="link" type="button" onclick="openScreen('signup')">Create account</button></div>
      </section>

      <section class="screen" id="signup">
        <h1>Create your free account</h1>
        <p class="sub">Create your homeowner account and continue to your quote intake.</p>
        <div class="error" id="signupError"></div>
        <div class="success" id="signupSuccess"></div>
        <form class="form" id="signupForm">
          <div class="grid">
            <div class="field"><label>First name</label><input id="firstName" type="text" placeholder="First name" required></div>
            <div class="field"><label>Last name</label><input id="lastName" type="text" placeholder="Last name" required></div>
          </div>
          <div class="field"><label>Email address</label><input id="signupEmail" type="email" placeholder="you@example.com" required></div>
          <div class="field">
            <label>Password</label>
            <div class="password-wrap">
              <input id="signupPass" type="password" placeholder="Create a password" required>
              <button class="toggle" type="button" data-toggle="signupPass">Show</button>
            </div>
          </div>
          <div class="field">
            <label>Confirm password</label>
            <div class="password-wrap">
              <input id="signupPass2" type="password" placeholder="Confirm password" required>
              <button class="toggle" type="button" data-toggle="signupPass2">Show</button>
            </div>
          </div>
          <button class="btn btn-green" type="submit">Create Account →</button>
        </form>
        <div class="divider">Already have an account?</div>
        <div class="link-row"><button class="link" type="button" onclick="openScreen('login')">Sign in instead</button></div>
      </section>
    </div>
  </div>

  <script>
    function openScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.querySelector(`.tab[data-screen="${id}"]`).classList.add('active');
      clearMessages();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function setMessage(id, text) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = text;
      el.classList.add('show');
    }

    function clearMessages() {
      document.querySelectorAll('.error, .success, .notice').forEach(el => {
        el.textContent = '';
        el.classList.remove('show');
      });
    }

    function friendlyAuthError(message) {
      const lower = (message || '').toLowerCase();
      if (lower.includes('invalid login credentials')) return 'Incorrect email or password.';
      if (lower.includes('user already registered')) return 'An account with that email already exists.';
      if (lower.includes('password')) return message;
      return message || 'Something went wrong. Please try again.';
    }

    document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => openScreen(tab.dataset.screen)));
    document.querySelectorAll('[data-toggle]').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.toggle);
        const show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        btn.textContent = show ? 'Hide' : 'Show';
      });
    });

    async function redirectByRole() {
      const role = await getUserRole();
      if (role === 'homeowner') {
        window.location.href = '/app/homeowner-dashboard.html';
        return;
      }
      if (role === 'contractor') {
        window.location.href = '/app/contractor-portal.html';
        return;
      }
      if (role === 'admin') {
        window.location.href = '/app/founder-dashboard.html';
        return;
      }
      setMessage('loginError', 'Your account exists, but no valid role was found.');
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();
      const form = e.currentTarget;
      form.classList.add('loading');
      try {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPass').value;
        const { error } = await db.auth.signInWithPassword({ email, password });
        if (error) throw error;
        setMessage('loginSuccess', 'Signed in. Redirecting...');
        await redirectByRole();
      } catch (err) {
        setMessage('loginError', friendlyAuthError(err.message));
      } finally {
        form.classList.remove('loading');
      }
    });

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();
      const form = e.currentTarget;
      form.classList.add('loading');
      try {
        const firstName = document.getElementById('firstName').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPass').value;
        const confirm = document.getElementById('signupPass2').value;

        if (password !== confirm) throw new Error("Passwords don't match.");

        const { data, error } = await db.auth.signUp({ email, password });
        if (error) throw error;
        const user = data?.user;
        if (!user) throw new Error('Account was created, but no user record was returned.');

        const fullName = `${firstName} ${lastName}`.trim();
        const { error: insertError } = await db.from('users').insert({
          id: user.id,
          email: user.email,
          full_name: fullName,
          role: 'homeowner'
        });
        if (insertError) {
          const message = (insertError.message || '').toLowerCase();
          if (message.includes('row-level security')) {
            throw new Error('Signup reached Supabase, but profile creation is blocked by the current database policy. Run the Supabase RLS fix in the browser checklist, then try again.');
          }
          throw insertError;
        }

        setMessage('signupSuccess', 'Account created. Redirecting to your intake...');
        window.location.href = '/app/homeowner-intake.html';
      } catch (err) {
        setMessage('signupError', friendlyAuthError(err.message));
      } finally {
        form.classList.remove('loading');
      }
    });
  </script>
</body>
</html>
